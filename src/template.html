<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>to do list</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Today</div>
    </div>
    <div class="sidebar">
      <h1 class="sidebar-heading">TO-DO</h1>
      <button class="addProject">Add Project</button>
      <dialog class="addProjectModal">
        <form>
          <input type="text" id="name" name="name" placeholder="Project Title...">
          <button type="submit" class="modal-submit">Add Project</button>
          <div class="error"></div>
        </form>
      </dialog>
      <dialog class="decline">
        <div class="decline-div">
          <h3 class="decline-title">You have hit the limit of 15 projects</h3>
          <button class="decline-close">Close</button>
        </div>
      </dialog>
      <div class="projects-section"></div>
    </div>
    <div class="main">
      <dialog class="add-task-modal">
        <form class="add-task-modal-form">
          <input type="text" id="title" name="title" placeholder="Title...">
          <textarea type="textarea" id="description" name="description" placeholder="Description..." rows="6" maxlength="300"></textarea>
          <input type="text" id="dueDate" name="dueDate" placeholder="Due Date..." oninput="formatDate(this)">
          <select name="priority" id="priority">
            <option value="Priority">Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <div class="task-error"></div>
          <div class="buttons">
            <button type="submit" class="task-submit">Add Task</button>
            <button class="task-cancel">Cancel</button>
          </div>
        </form>
      </dialog>
      <dialog class="edit-task-modal">
        <form class="edit-task-modal-form">
          <input type="text" id="edit-title" name="edit-title" placeholder="Task Title">
          <textarea type="textarea" id="edit-description" name="edit-description" placeholder="Task Description" rows="6" maxlength="300"></textarea>
          <input type="text" id="edit-dueDate" name="edit-dueDate" placeholder="Due Date..." oninput="formatDate(this)">
          <select name="edit-priority" id="edit-priority">
            <option value="Priority">Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <div class="edit-task-error"></div>
          <div class="buttons">
            <button type="submit" class="edit-task-submit">Edit Task</button>
            <button class="edit-task-cancel">Cancel</button>
          </div>
        </form>
      </dialog>
      <div class="main-title"></div>
      <div class="tasks-section">
        <div class="empty-message" style="display: none;">Click Add Project to get started!</div>
      </div>
    </div>
  </div>

  <script>
    function formatDate(input) {
      let value = input.value.replace(/\D/g, '');
      
      if (value.length > 2 && value.length <= 4) {
        value = value.slice(0, 2) + '/' + value.slice(2);
      } else if (value.length > 4) {
        value = value.slice(0, 2) + '/' + value.slice(2, 4) + '/' + value.slice(4, 8);
      }
      
      input.value = value;
    }
  </script>
</body>
</html>
